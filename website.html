  }

  .about-grid{
    grid-template-columns:1fr !important;

  .demo-flex, .mowaat-flex{

  }

  .demo-outer{

  .demo-right-panel{
    min-width:0 !important;

  h1{ font-size:clamp(1.5rem,7vw,2rem) !important; word-break:break-word !important; }

  p, span, li, div{

    overflow-wrap:break-word !important;

  .hero-stats-grid{

  .hero-stats-grid > div{
    padding:0.75rem 0.5rem !important;
  }
  .hero-stats-grid span:first-child{
    font-size:1.1rem !important;
  }
  .hero-stats-grid span:last-child{
    font-size:10px !important;
  }

  .process-step{
    flex-wrap:wrap !important;
    gap:0.5rem !important;
  }
  .process-step .badge{
    flex-shrink:0 !important;
  }

  .product-visual-col{
    display:none !important;
    visibility:hidden !important;
    width:0 !important;
    height:0 !important;
    overflow:hidden !important;
  }

  .product-copy-col{
    width:100% !important;
    grid-column:1 / -1 !important;
  }

  /* Contact page — 2 col → 1 col */
  .contact-grid{
    grid-template-columns:1fr !important;
    min-height:auto !important;
    display:block !important;
  }
  .contact-grid > div{
    padding:1.75rem 1.25rem !important;
    width:100% !important;
    box-sizing:border-box !important;
  }
  /* Hide the left info panel on mobile — form only */
  .contact-info-panel{
    display:none !important;
  }

  /* All sections — reduce side padding on mobile */
  section{
    padding-left:1rem !important;
    padding-right:1rem !important;
    box-sizing:border-box !important;
    width:100% !important;
    overflow-x:hidden !important;

  .trust-bar{
    gap:1rem !important;
    padding:0.55rem 1rem !important;

  .trust-bar span{
    font-size:10px !important;
  }
  .trust-bar svg{
    width:12px !important;
    height:12px !important;
  }

  /* Live badge in chat header — fix alignment */
  .live-badge{
    flex-shrink:0 !important;
    white-space:nowrap !important;
  }

  /* Cero Migración — fix right overflow from section padding */
  .no-migration-section{
    padding-left:1rem !important;
    padding-right:1rem !important;
  }

  /* All maxWidth containers — respect viewport */
  .two-col, [style*="maxWidth:1100"], [style*="maxWidth:760"]{
    width:100% !important;
    box-sizing:border-box !important;
  }

  /* Demo tab selector — wrap on mobile */
  .demo-tab-selector{
    border-radius:14px !important;
    max-width:100% !important;
  }

  /* Pricing card — rounded corners when stacked */
  .pricing-grid > div{
    border-radius:0 !important;
    border-bottom:1px solid rgba(255,255,255,0.07) !important;
  }
  .pricing-grid > div:first-child{
    border-radius:18px 18px 0 0 !important;
  }
  .pricing-grid > div:last-child{
    border-radius:0 0 18px 18px !important;
    border-bottom:none !important;
  }

        '</div>',
        '<h3 style="font-weight:600;font-size:17px;color:#ffffff;margin-bottom:4px;letter-spacing:-0.374px;font-family:SF Pro Display,system-ui,-apple-system,sans-serif">JM20 Support</h3>',
        '<p style="font-size:13px;color:#a0a0a0;margin-bottom:20px;font-family:SF Pro Text,system-ui,-apple-system,sans-serif">Sign in to get help from our team.</p>',
      '</div>',
      '<div style="margin:0 16px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;">',
        '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px">',
          '<input id="jm-email" class="jm-field" type="email" placeholder="Email address" autocomplete="email"/>',
          '<input id="jm-pwd" class="jm-field" type="password" placeholder="Password" autocomplete="current-password"/>',
        '</div>',
        '<div id="jm-err" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:#ef4444;margin-bottom:10px;font-family:SF Pro Text,system-ui,-apple-system,sans-serif"></div>',
        '<button id="jm-signin-btn">Login</button>',
      '</div>',
      '<p style="text-align:center;font-size:11px;color:#a0a0a0;padding:0 16px 14px;font-family:SF Pro Text,system-ui,-apple-system,sans-serif">🔒 Secured by Supabase · GDPR compliant</p>',
    ].join('');

    panel.querySelector('#jm-close').onclick = function() { state.open = false; renderWidget(); };

    function doLogin() {
      var email = panel.querySelector('#jm-email').value.trim();
      var pwd   = panel.querySelector('#jm-pwd').value;
      var errEl = panel.querySelector('#jm-err');
      var btn   = panel.querySelector('#jm-signin-btn');
      if (!email || !pwd) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Signing in…'; errEl.style.display = 'none';
      sbLogin(email, pwd).then(function(d) {
        state.jwt = d.access_token;
        return sbGetCustomer(email, d.access_token);
      }).then(function(customer) {
        state.user = customer || { id: '', email: email, first_name: email.split('@')[0], last_name: '' };
        state.messages = [{ role: 'bot', text: 'Hi ' + (state.user.first_name || 'there') + '! 👋 How can I help you today?', time: now() }];
        renderWidget();
      }).catch(function(err) {
        errEl.textContent = err.message || 'Login failed. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Login';
      });
    }

    panel.querySelector('#jm-signin-btn').onclick = doLogin;
    panel.querySelectorAll('input').forEach(function(inp) {
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
    });
  }

  /* ── CHAT HEADER ── */
  function renderChatHeader(panel) {
    var header = document.createElement('div');
    header.style.cssText = 'background:linear-gradient(135deg,#2997ff,#0066cc);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0';
    header.innerHTML = [
      '<div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">',
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="8" width="18" height="12" rx="3" fill="white" fill-opacity=".95"/><rect x="7" y="11" width="3" height="3" rx="1" fill="#2997ff"/><rect x="14" y="11" width="3" height="3" rx="1" fill="#2997ff"/></svg>',
      '</div>',
      '<div style="flex:1">',
        '<div style="font-weight:600;font-size:13px;color:#fff;font-family:SF Pro Text,system-ui,-apple-system,sans-serif">JM20 Assistant</div>',
        '<div style="display:flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block"></span><span style="font-size:11px;color:rgba(255,255,255,0.75);font-family:SF Pro Text,system-ui,-apple-system,sans-serif">Online · n8n powered</span></div>',
      '</div>',
      '<button id="jm-signout" style="background:rgba(255,255,255,0.18);border:none;border-radius:9999px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,0.9);cursor:pointer;font-family:SF Pro Text,system-ui,-apple-system,sans-serif;font-weight:400">Sign out</button>',
    ].join('');
    header.querySelector('#jm-signout').onclick = function() {
      window.__jmAuth = { user: null, jwt: null };
      window.dispatchEvent(new Event('jm-auth-changed'));
      state.user = null; state.jwt = null; state.messages = []; renderWidget();
    };
    panel.appendChild(header);
  }

  /* ── MESSAGES ── */
  function renderMessages(panel) {
    var box = document.createElement('div');
    box.id = 'jm-messages';

    state.messages.forEach(function(m) {
      box.appendChild(makeMsgEl(m));
    });

    if (state.sending) {
      var t = document.createElement('div');
      t.className = 'jm-msg jm-msg-bot';
      t.innerHTML = '<div class="jm-typing"><div class="jm-dot" style="animation-delay:0s"></div><div class="jm-dot" style="animation-delay:.15s"></div><div class="jm-dot" style="animation-delay:.3s"></div></div>';
      box.appendChild(t);
    }

    panel.appendChild(box);
    setTimeout(function(){ box.scrollTop = box.scrollHeight; }, 0);
  }

  function makeMsgEl(m) {
    var wrap = document.createElement('div');
    wrap.className = 'jm-msg ' + (m.role === 'user' ? 'jm-msg-user' : 'jm-msg-bot');
    var bubble = document.createElement('div');
    bubble.className = m.role === 'user' ? 'jm-bubble-user' : (m.isErr ? 'jm-bubble-err' : 'jm-bubble-bot');
    if (m.role === 'bot' && !m.isErr) {
      bubble.innerHTML = '<p style="margin:0">' + renderMarkdown(m.text) + '</p>';
    } else {
      bubble.textContent = m.text;
    }
    if (m.audioUrl) {
      var replayBtn = document.createElement('button');
      replayBtn.textContent = '🔊 Replay';
      replayBtn.style.cssText = 'display:block;margin-top:6px;background:none;border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.7);font-size:11px;padding:3px 9px;cursor:pointer;';
      replayBtn.onclick = function() { new Audio(m.audioUrl).play(); };
      bubble.appendChild(replayBtn);
    }
    var time = document.createElement('div');
    time.className = 'jm-time';
    time.textContent = m.time;
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    return wrap;
  }

  function addMessage(m) {
    state.messages.push(m);
    var box = document.getElementById('jm-messages');
    if (!box) return;
    var typing = box.querySelector('.jm-typing');
    if (typing && typing.parentElement) typing.parentElement.remove();
    box.appendChild(makeMsgEl(m));
    box.scrollTop = box.scrollHeight;
  }

  /* ── INPUT ROW ── */
  function renderInputRow(panel) {
    var row = document.createElement('div');
    row.id = 'jm-input-row';
    row.innerHTML = [
      '<input id="jm-input" type="text" placeholder="Type or speak a message…"/>',
      '<button id="jm-mic" title="Click to speak">',
        '<svg id="jm-mic-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
        '<svg id="jm-mic-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
      '</button>',
      '<button id="jm-send">',
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      '</button>',
    ].join('');
    panel.appendChild(row);

    var hint = document.createElement('div');
    hint.style.cssText = 'padding:4px 12px 8px;font-size:11px;color:rgba(255,255,255,0.3);text-align:center;background:#1d1d1f;font-family:SF Pro Text,system-ui,-apple-system,sans-serif';
    hint.textContent = '🎤 Haz click para hablar, y de nuevo para enviar';
    panel.appendChild(hint);

    var input = row.querySelector('#jm-input');
    var btn   = row.querySelector('#jm-send');

    function doSend() {
      var text = input.value.trim();
      if (!text || state.sending) return;
      input.value = '';
      var currentInputType = inputType;
      inputType = 'text';
      state.sending = true;

      addMessage({ role: 'user', text: text, time: now() });

      var box = document.getElementById('jm-messages');
      if (box) {
        var t = document.createElement('div');
        t.className = 'jm-msg jm-msg-bot';
        t.innerHTML = '<div class="jm-typing"><div class="jm-dot" style="animation-delay:0s"></div><div class="jm-dot" style="animation-delay:.15s"></div><div class="jm-dot" style="animation-delay:.3s"></div></div>';
        box.appendChild(t);
        box.scrollTop = box.scrollHeight;
      }

      btn.disabled = true;

      fetch(N8N_WEBHOOK, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (state.jwt || '')
        },
        body: JSON.stringify({
          action: 'sendMessage',
          chatInput: text,
          customer_id: state.user.id || '',
          input_type: currentInputType
        })
      })
      .then(function(r) { return r.text().then(function(raw) { return { ok: r.ok, status: r.status, raw: raw }; }); })
      .then(function(r) {
        var reply = r.raw;
        try {
          var d = JSON.parse(r.raw);
          reply = d.output || d.text || d.response || d.message || r.raw;
          if (d.audio_base64) {
            var bytes = atob(d.audio_base64);
            var arr = new Uint8Array(bytes.length);
            for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            var blob = new Blob([arr], { type: d.audio_type || 'audio/mpeg' });
            var audioUrl = URL.createObjectURL(blob);
            new Audio(audioUrl).play();
            reply = d.text ? '🔊 ' + d.text : '🔊';
            addMessage({ role: 'bot', text: reply, isErr: !r.ok, time: now(), audioUrl: audioUrl });
          } else {
            addMessage({ role: 'bot', text: reply, isErr: !r.ok, time: now() });
          }
        } catch(e) {
          addMessage({ role: 'bot', text: reply, isErr: !r.ok, time: now() });
        }
      })
      .catch(function(e) {
        addMessage({ role: 'bot', text: 'Network error: ' + e.message, isErr: true, time: now() });
      })
      .finally(function() {
        state.sending = false;
        btn.disabled = false;
        var b = document.getElementById('jm-messages');
        if (b) b.scrollTop = b.scrollHeight;
      });
    }

    btn.onclick = doSend;
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSend(); });

    /* ── VOICE INPUT ── */
    var micBtn      = row.querySelector('#jm-mic');
    var micIcon     = row.querySelector('#jm-mic-icon');
    var micSpinner  = row.querySelector('#jm-mic-spin');
    var mediaRec    = null;
    var audioChunks = [];
    var isRec       = false;
    var inputType   = 'text';

    micBtn.addEventListener('click', function() {
      if (isRec) { stopRec(); } else { startRec(); }
    });

    function startRec() {
      if (WHISPER_WEBHOOK === 'YOUR_N8N_WHISPER_WEBHOOK_URL') return;
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        audioChunks = [];
        var mime = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4']
          .find(function(m){ return MediaRecorder.isTypeSupported(m); }) || '';
        mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
        mediaRec.ondataavailable = function(e){ if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRec.onstop = function() { stream.getTracks().forEach(function(t){ t.stop(); }); transcribeRec(); };
        var input = row.querySelector('#jm-input');
        var origPlaceholder = input ? input.placeholder : '';
        if (input) input.placeholder = '🎤 Listo... habla';
        setTimeout(function() {
          mediaRec.start(100);
          isRec = true;
          micBtn.classList.add('jm-mic-recording');
          micIcon.style.display = 'block';
          micSpinner.style.display = 'none';
          micBtn.title = 'Click to stop';
          if (input) input.placeholder = origPlaceholder;
        }, 1200);
      }).catch(function(err) { console.error('Mic error:', err); });
    }

    function stopRec() {
      if (!mediaRec || !isRec) return;
      isRec = false;
      micBtn.classList.remove('jm-mic-recording');
      micBtn.classList.add('jm-mic-processing');
      micIcon.style.display = 'none';
      micSpinner.style.display = 'block';
      micBtn.title = 'Transcribing…';
      setTimeout(function() { mediaRec.stop(); }, 500);
    }

    function transcribeRec() {
      var mime     = audioChunks[0] && audioChunks[0].type || 'audio/webm';
      var ext      = mime.includes('mp4') ? 'mp4' : mime.includes('ogg') ? 'ogg' : 'webm';
      var blob     = new Blob(audioChunks, { type: mime });
      var fd       = new FormData();
      fd.append('audio', blob, 'voice.' + ext);
      fetch(WHISPER_WEBHOOK, { method: 'POST', body: fd })
        .then(function(r){ return r.json(); })
        .then(function(d){
          var text = d.text || d.transcript || d.output || '';
          // Ignore if empty or suspiciously long (Whisper hallucinating the prompt)
          if (text.trim() && text.trim().length < 300) {
            input.value = (input.value.trim() ? input.value.trim() + ' ' : '') + text.trim();
            inputType = 'voice';
            input.focus();
          }
        })
        .catch(function(e){ console.error('Transcription error:', e); })
        .finally(function(){
          micBtn.classList.remove('jm-mic-processing');
          micIcon.style.display = 'block';
          micSpinner.style.display = 'none';
          micBtn.title = 'Click to speak';
        });
    }
  }

  /* ── BUBBLE BUTTON ── */
  var bubble = document.createElement('button');
  bubble.id = 'jm-bubble';
  bubble.title = 'Chat with JM20';
  bubble.innerHTML = CHAT_ICON;

  bubble.onclick = function() {
    state.open = !state.open;
    renderWidget();
  };

  document.body.appendChild(bubble);

})();
</script>

<script>
/* ── Scroll-reveal: IntersectionObserver ── */
(function(){
  var DELAY_STEP = 80; /* ms stagger between sibling sections */

  function init(){
    var sections = document.querySelectorAll('section');
    if(!sections.length){ setTimeout(init, 150); return; }

    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.07, rootMargin: '0px 0px -48px 0px' });

    sections.forEach(function(el, i){
      /* skip the very first section (hero — already in view on load) */
      if(i === 0) return;
      el.classList.add('jm-reveal');
      /* small stagger so adjacent sections don't all pop at once */
      el.style.transitionDelay = (Math.min(i, 3) * DELAY_STEP) + 'ms';
      observer.observe(el);
    });
  }

  /* wait for React to finish its first paint */
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(init, 350); });
  } else {
    setTimeout(init, 350);
  }
})();
</script>
